# netlify.toml
[[headers]]
  for = "/*.mp4"
  [headers.values]
  Access-Control-Allow-Origin = "*"
  Accept-Ranges = "bytes"
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
  Access-Control-Allow-Origin = "*"
  Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
  Access-Control-Allow-Headers = "Origin, Content-Type, Accept, Range"


